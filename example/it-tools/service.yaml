# A Service — a stable name + IP in front of the pods.
# It finds pods by the `app: it-tools` selector and forwards :80 -> pod :80.
apiVersion: v1
kind: Service
metadata:
  name: it-tools
spec:
  selector:
    app: it-tools
  ports:
    - port: 80           # the Service's port (what the Ingress points at)
      targetPort: 80     # the container's port
